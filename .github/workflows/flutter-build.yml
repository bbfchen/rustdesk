name: Flutter Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        required: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Debug: Show hbb_common submodule source and latest commit
        run: |
          echo "🔍 Submodule 'libs/hbb_common' remote and commit:"
          cd libs/hbb_common
          git remote -v
          git log -1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Rust FFI bindings (optional)
        run: |
          if command -v flutter_rust_bridge_codegen &> /dev/null; then
            flutter_rust_bridge_codegen generate
          else
            echo "flutter_rust_bridge_codegen not installed, skipping."
          fi

      - name: Copy Rust shared library for Android (arm64-v8a)
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp ./target/aarch64-linux-android/release/liblibrustdesk.so android/app/src/main/jniLibs/arm64-v8a/librustdesk.so

      - name: Build APK (Android arm64 only)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename APK
        run: |
          ls -al build/app/outputs/flutter-apk/
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk rustdesk-arm64.apk

      - name: Package IPK for aarch64
        run: |
          mkdir -p ipk/usr/bin
          cp rustdesk-arm64.apk ipk/usr/bin/
          mkdir -p ipk/CONTROL
          echo "Package: rustdesk-android" > ipk/CONTROL/control
          echo "Version: 1.0" >> ipk/CONTROL/control
          echo "Architecture: aarch64" >> ipk/CONTROL/control
          echo "Description: Rustdesk APK for Android (aarch64)" >> ipk/CONTROL/control
          tar -czf rustdesk-android-aarch64.ipk -C ipk .

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Build Flutter macOS
        if: runner.os == 'macOS'
        run: flutter build macos --release

      - name: Build Flutter Windows
        if: runner.os == 'Windows'
        run: flutter build windows --release

      - name: Build Flutter Linux
        if: runner.os == 'Linux'
        run: flutter build linux --release

      - name: Build Flutter iOS
        if: runner.os == 'macOS'
        run: flutter build ios --release --no-codesign

      - name: Upload built APK
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-arm64
          path: rustdesk-arm64.apk

      - name: Upload built IPK
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-android-aarch64-ipk
          path: rustdesk-android-aarch64.ipk

      - name: Upload built Web
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-web
          path: build/web/**

      - name: Upload built macOS app
        if: inputs.upload-artifact == true && runner.os == 'macOS'
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-macos
          path: build/macos/Build/Products/Release/*.app

      - name: Upload built Windows app
        if: inputs.upload-artifact == true && runner.os == 'Windows'
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-windows
          path: build/windows/runner/Release/*.exe

      - name: Upload built Linux app
        if: inputs.upload-artifact == true && runner.os == 'Linux'
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-linux
          path: build/linux/x64/release/bundle/**

      - name: Upload built iOS app
        if: inputs.upload-artifact == true && runner.os == 'macOS'
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-ios
          path: build/ios/iphoneos/*.app
